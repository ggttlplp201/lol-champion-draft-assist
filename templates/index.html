<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Advisor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="header-logo">&#9876; Draft Advisor</div>
        <nav class="role-tabs" id="role-tabs">
            <button class="role-tab" data-role="top">Top</button>
            <button class="role-tab" data-role="jungle">Jungle</button>
            <button class="role-tab active" data-role="mid">Mid</button>
            <button class="role-tab" data-role="bottom">Bot</button>
            <button class="role-tab" data-role="support">Support</button>
        </nav>
        <div class="view-tabs">
            <button class="view-tab active" data-tab="overall">Best Overall</button>
            <button class="view-tab" data-tab="pool">From My Pool</button>
        </div>
    </header>

    <div class="page-body">
        <aside class="draft-panel">
            <div class="draft-section">
                <div class="draft-label">Ally Picks</div>
                <div class="slot-grid" id="ally-slots">
                    <div class="champ-slot empty" data-type="ally" data-index="0"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ally" data-index="1"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ally" data-index="2"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ally" data-index="3"><span class="slot-plus">+</span></div>
                </div>
            </div>
            <div class="draft-section">
                <div class="draft-label">Enemy Picks</div>
                <div class="slot-grid" id="enemy-slots">
                    <div class="champ-slot empty" data-type="enemy" data-index="0"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="enemy" data-index="1"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="enemy" data-index="2"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="enemy" data-index="3"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="enemy" data-index="4"><span class="slot-plus">+</span></div>
                </div>
            </div>
            <div class="draft-section">
                <div class="draft-label">Bans</div>
                <div class="slot-grid" id="ban-slots">
                    <div class="champ-slot empty" data-type="ban" data-index="0"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ban" data-index="1"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ban" data-index="2"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ban" data-index="3"><span class="slot-plus">+</span></div>
                    <div class="champ-slot empty" data-type="ban" data-index="4"><span class="slot-plus">+</span></div>
                </div>
            </div>
            <div class="draft-section">
                <div class="draft-label">My Champion Pool</div>
                <input class="pool-input" id="pool-input" type="text" placeholder="Type name + Enter...">
                <div class="pool-tags" id="pool-tags"></div>
            </div>
        </aside>

        <main class="rec-panel">
            <div class="rec-table-header">
                <span class="col-rank">#</span>
                <span class="col-champ">Champion</span>
                <span class="col-tier">Tier</span>
                <span class="col-score">Score</span>
                <span class="col-stat">Win%</span>
                <span class="col-stat">Pick%</span>
                <span class="col-stat">Ban%</span>
            </div>
            <div id="recommendations"></div>
        </main>

        <aside class="detail-panel">
            <div class="detail-top">
                <div class="detail-avatar" id="detail-avatar">?</div>
                <div class="detail-meta">
                    <div class="detail-name" id="detail-name">Select a champion</div>
                    <div class="detail-sub">
                        <span class="detail-tier-badge" id="detail-tier"></span>
                        <span class="detail-score-val" id="detail-score"></span>
                    </div>
                </div>
            </div>

            <div class="detail-stats-row">
                <div class="dstat"><div class="dstat-label">Win%</div><div class="dstat-val" id="dstat-wr">--</div></div>
                <div class="dstat"><div class="dstat-label">Pick%</div><div class="dstat-val" id="dstat-pr">--</div></div>
                <div class="dstat"><div class="dstat-label">Ban%</div><div class="dstat-val" id="dstat-br">--</div></div>
            </div>

            <div class="detail-bars">
                <div class="bar-row">
                    <span class="bar-label">Meta</span>
                    <div class="bar-track"><div class="bar-fill meta" id="bar-meta" style="width:0%"></div></div>
                    <span class="bar-val" id="val-meta">--</span>
                </div>
                <div class="bar-row">
                    <span class="bar-label">Synergy</span>
                    <div class="bar-track"><div class="bar-fill synergy" id="bar-synergy" style="width:0%"></div></div>
                    <span class="bar-val" id="val-synergy">--</span>
                </div>
                <div class="bar-row">
                    <span class="bar-label">Counter</span>
                    <div class="bar-track"><div class="bar-fill counter" id="bar-counter" style="width:0%"></div></div>
                    <span class="bar-val" id="val-counter">--</span>
                </div>
                <div class="bar-row" id="pool-bar-row" style="display:none">
                    <span class="bar-label">Pool</span>
                    <div class="bar-track"><div class="bar-fill pool" id="bar-pool" style="width:0%"></div></div>
                    <span class="bar-val" id="val-pool">--</span>
                </div>
            </div>

            <div class="detail-reasons">
                <div class="reasons-title">Why this pick</div>
                <ul class="reasons-list" id="reasons-list">
                    <li>Select a recommendation to see analysis.</li>
                </ul>
            </div>
        </aside>
    </div>

    <!-- Champion picker modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-head">
                <span>Select Champion</span>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <input class="modal-search" id="modal-search" type="text" placeholder="Search champions...">
                <div class="champ-grid" id="champ-grid"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
